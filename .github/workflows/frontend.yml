name: Secure-Frontend-Build-Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  production-build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies (Production Mode)
        run: npm install --no-fund --prefer-offline --no-audit
        working-directory: frontend

      - name: Linting & Static Analysis
        run: npm run lint
        working-directory: frontend

      - name: Security Dependency Audit
        continue-on-error: true
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Advanced Security Scan (Trivy)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: 'frontend'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          exit-code: 1

      - name: Execution of Unit Tests
        run: npm test
        working-directory: frontend

      - name: Production Build
        run: npm run build
        working-directory: frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-production-dist
          path: frontend/dist
          retention-days: 30
