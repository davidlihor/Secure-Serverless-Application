name: Infrastructure-Governance-and-Deployment

on:
  push:
    branches:
      - main
    paths: 
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
    paths: 
      - terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:
  workflow_run:
    workflows: 
      - Secure-Frontend-Build-Pipeline
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  TF_VERSION: 1.15.6

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform

  security-and-quality-scan:
    name: Terraform Security and Quality Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Checkov (Security Guardrails)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform
          output_format: sarif
          output_file_path: ${{ github.workspace }}/terraform/checkov-results.sarif
          soft_fail: true

      - name: Setup TFLint (Deep Static Analysis)
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: v0.44.1

      - name: Run TFLint
        run: |
          tflint --init
          tflint -f compact
        working-directory: terraform

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report-terraform
          path: terraform/checkov-results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terraform/checkov-results.sarif

      - name: Run Trivy (Cloud Misconfigurations)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: config
          scan-ref: ./terraform
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          security-checks: config
 
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: 
      - validate
      - security-and-quality-scan
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (remote S3)
        run: |
          terraform init \
            -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false
        working-directory: terraform

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out tfplan
        working-directory: terraform

      - name: Save Plan Output
        if: ${{ steps.plan.outcome == 'success' }}
        run: |
          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan.txt
          else
            echo "tfplan missing" >&2
            exit 1
          fi
        working-directory: terraform

      - name: Post Plan to Pull Request
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/iac-plan-commenter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          plan-file: 'terraform/plan.txt'

      - name: Upload Plan as Artifact
        if: ${{ steps.plan.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-terraform
          path: |
            terraform/plan.txt
            terraform/tfplan
          retention-days: 14

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    environment: production
    needs: 
      - security-and-quality-scan
      - plan
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Download frontend build
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: frontend.yml
          workflow_conclusion: success
          name: frontend-production-dist
          path: frontend/dist
          if_no_artifact_found: fail

      - name: Terraform Init (remote S3)
        run: |
          terraform init \
            -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -parallelism=1
        working-directory: terraform

      - name: Extract Terraform Outputs
        run: |
          echo "API_GATEWAY_URL=$(terraform output -raw api_gateway_url)" >> $GITHUB_ENV
          echo "COGNITO_USER_POOL_ID=$(terraform output -raw  cognito_user_pool_id)" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$(terraform output -raw cognito_client_id)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DOMAIN=$(terraform output -raw cloudfront_domain_name)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV
          echo "FRONTEND_S3_BUCKET=$(terraform output -raw frontend_bucket_id)" >> $GITHUB_ENV
        working-directory: terraform

      - name: Configure and Deploy Frontend to S3
        run: |
          sed -e "s|API_URL|$API_GATEWAY_URL|g" \
              -e "s|USER_POOL_ID|$COGNITO_USER_POOL_ID|g" \
              -e "s|CLIENT_ID|$COGNITO_CLIENT_ID|g" \
              -e "s|CLOUDFRONT_DOMAIN|$CLOUDFRONT_DOMAIN|g" \
              -e "s|AWS_REGION|$AWS_REGION|g" \
              frontend/config.js.tpl > frontend/dist/config.js
          
          aws s3 sync frontend/dist/ s3://${{ env.FRONTEND_S3_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
